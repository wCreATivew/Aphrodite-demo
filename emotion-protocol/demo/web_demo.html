<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 情感状态实验平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            color: #a0a0a0;
            font-size: 1.1em;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .panel h2 {
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        
        /* 情感条样式 */
        .emotion-bar-container {
            margin-bottom: 15px;
        }
        
        .emotion-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.95em;
        }
        
        .emotion-bar {
            height: 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        
        .emotion-bar-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.5s ease, background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        /* 效价唤醒度 */
        .valence-arousal {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        .va-meter {
            text-align: center;
        }
        
        .va-meter label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #a0a0a0;
        }
        
        .va-bar {
            height: 30px;
            background: linear-gradient(90deg, #ff4444 0%, #888888 50%, #44ff44 100%);
            border-radius: 15px;
            position: relative;
        }
        
        .va-indicator {
            position: absolute;
            top: -5px;
            width: 4px;
            height: 40px;
            background: #fff;
            border-radius: 2px;
            transition: left 0.5s ease;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        
        /* 主导情感 */
        .dominant-emotion {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .dominant-emoji {
            font-size: 5em;
            display: block;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .dominant-name {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        /* 事件触发区 */
        .event-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        20px;
        }
        
        .event-btn {
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .event-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .event-btn:active {
            transform: translateY(0);
        }
        
        .event-btn.joy { background: linear-gradient(135deg, #ffd700, #ffec8b); color: #333; }
        .event-btn.sadness { background: linear-gradient(135deg, #4a90e2, #87ceeb); color: #fff; }
        .event-btn.anger { background: linear-gradient(135deg, #e74c3c, #ff6b6b); color: #fff; }
        .event-btn.surprise { background: linear-gradient(135deg, #9b59b6, #be90d4); color: #fff; }
        .event-btn.love { background: linear-gradient(135deg, #ff69b4, #ffb6c1); color: #fff; }
        .event-btn.fear { background: linear-gradient(135deg, #2c3e50, #34495e); color: #fff; }
        .event-btn.custom { background: linear-gradient(135deg, #1abc9c, #48c9b0); color: #fff; }
        .event-btn.reset { background: linear-gradient(135deg, #95a5a6, #bdc3c7); color: #333; }
        
        .event-btn span.emoji {
            font-size: 1.5em;
        }
        
        /* 时间线 */
        .timeline {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .timeline-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .timeline-time {
            font-size: 0.8em;
            color: #888;
            min-width: 60px;
        }
        
        .timeline-event {
            flex: 1;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        .timeline-emotion {
            font-size: 1.5em;
            margin-left: 10px;
        }
        
        /* 自定义输入 */
        .custom-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .custom-input input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1em;
        }
        
        .custom-input input::placeholder {
            color: #888;
        }
        
        .custom-input button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .custom-input button:hover {
            transform: scale(1.05);
        }
        
        /* 状态图 */
        .state-canvas {
            width: 100%;
            height: 200px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-top: 15px;
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎭 情感状态实验平台</h1>
            <p>Emotion State Protocol - Interactive Demo</p>
        </header>
        
        <div class="grid">
            <!-- 左侧：情感状态显示 -->
            <div class="panel">
                <h2>📊 当前情感状态</h2>
                
                <div class="dominant-emotion">
                    <span class="dominant-emoji" id="dominantEmoji">😐</span>
                    <div class="dominant-name" id="dominantName">中性</div>
                </div>
                
                <div id="emotionBars">
                    <!-- 情感条将动态生成 -->
                </div>
                
                <div class="valence-arousal">
                    <div class="va-meter">
                        <label>效价 Valence (负面 ←→ 正面)</label>
                        <div class="va-bar">
                            <div class="va-indicator" id="valenceIndicator" style="left: 50%"></div>
                        </div>
                        <div id="valenceValue" style="margin-top: 5px; font-size: 0.9em;">0.00</div>
                    </div>
                    <div class="va-meter">
                        <label>唤醒度 Arousal (平静 ←→ 激动)</label>
                        <div class="va-bar" style="background: linear-gradient(90deg, #4444ff 0%, #888888 50%, #ff4444 100%);">
                            <div class="va-indicator" id="arousalIndicator" style="left: 10%"></div>
                        </div>
                        <div id="arousalValue" style="margin-top: 5px; font-size: 0.9em;">0.10</div>
                    </div>
                </div>
                
                <canvas id="stateCanvas" class="state-canvas"></canvas>
            </div>
            
            <!-- 右侧：事件触发 -->
            <div class="panel">
                <h2>⚡ 事件触发</h2>
                
                <div class="event-buttons">
                    <button class="event-btn joy" onclick="triggerEvent('user_message', {text: '你太棒了!'})">
                        <span class="emoji">😊</span>
                        <span>赞美</span>
                    </button>
                    <button class="event-btn sadness" onclick="triggerEvent('user_message', {text: '我很难过...'})">
                        <span class="emoji">😢</span>
                        <span>悲伤消息</span>
                    </button>
                    <button class="event-btn anger" onclick="triggerEvent('user_message', {text: '我很生气!'})">
                        <span class="emoji">😠</span>
                        <span>愤怒</span>
                    </button>
                    <button class="event-btn surprise" onclick="triggerEvent('environment_change', {unexpected: true})">
                        <span class="emoji">😲</span>
                        <span>意外事件</span>
                    </button>
                    <button class="event-btn love" onclick="triggerEvent('user_message', {text: '我爱你'})">
                        <span class="emoji">😍</span>
                        <span>表达爱意</span>
                    </button>
                    <button class="event-btn fear" onclick="triggerEvent('memory_recall', {valence: 'negative'})">
                        <span class="emoji">😨</span>
                        <span>恐惧回忆</span>
                    </button>
                    <button class="event-btn custom" onclick="showCustomInput()">
                        <span class="emoji">✏️</span>
                        <span>自定义</span>
                    </button>
                    <button class="event-btn reset" onclick="resetEmotions()">
                        <span class="emoji">🔄</span>
                        <span>重置</span>
                    </button>
                </div>
                
                <div class="custom-input" id="customInput" style="display: none;">
                    <input type="text" id="customMessage" placeholder="输入自定义消息..." onkeypress="if(event.key==='Enter')sendCustomMessage()">
                    <button onclick="sendCustomMessage()">发送</button>
                </div>
                
                <h2 style="margin-top: 25px;">📜 事件日志</h2>
                <div class="timeline" id="timeline">
                    <!-- 时间线项目将动态生成 -->
                </div>
            </div>
        </div>
        
        <!-- 配置面板 -->
        <div class="panel">
            <h2>⚙️ 配置</h2>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div>
                    <label>衰减速率：<span id="decayRateValue">0.02</span>/秒</label>
                    <input type="range" id="decayRate" min="0.005" max="0.1" step="0.005" 
                           value="0.02" onchange="updateConfig()" style="width: 200px;">
                </div>
                <div>
                    <label>激活阈值：<span id="thresholdValue">0.30</span></label>
                    <input type="range" id="threshold" min="0.1" max="0.8" step="0.05" 
                           value="0.3" onchange="updateConfig()" style="width: 200px;">
                </div>
                <div>
                    <label>
                        <input type="checkbox" id="autoDecay" checked onchange="toggleAutoDecay()">
                        自动衰减
                    </label>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ═══════════════════════════════════════════════════════════
        // 情感引擎 (JavaScript 实现)
        // ═══════════════════════════════════════════════════════════
        
        const EmotionType = {
            JOY: 'joy',
            SADNESS: 'sadness',
            ANGER: 'anger',
            SURPRISE: 'surprise',
            FEAR: 'fear',
            DISGUST: 'disgust',
            NEUTRAL: 'neutral',
            LOVE: 'love',
            EXCITEMENT: 'excitement',
            ANXIETY: 'anxiety'
        };
        
        const EMOTION_EMOJI = {
            [EmotionType.JOY]: '😊',
            [EmotionType.SADNESS]: '😢',
            [EmotionType.ANGER]: '😠',
            [EmotionType.SURPRISE]: '😲',
            [EmotionType.FEAR]: '😨',
            [EmotionType.DISGUST]: '🤢',
            [EmotionType.NEUTRAL]: '😐',
            [EmotionType.LOVE]: '😍',
            [EmotionType.EXCITEMENT]: '🤩',
            [EmotionType.ANXIETY]: '😰'
        };
        
        const EMOTION_NAMES = {
            [EmotionType.JOY]: '开心',
            [EmotionType.SADNESS]: '悲伤',
            [EmotionType.ANGER]: '愤怒',
            [EmotionType.SURPRISE]: '惊讶',
            [EmotionType.FEAR]: '恐惧',
            [EmotionType.DISGUST]: '厌恶',
            [EmotionType.NEUTRAL]: '中性',
            [EmotionType.LOVE]: '喜爱',
            [EmotionType.EXCITEMENT]: '兴奋',
            [EmotionType.ANXIETY]: '焦虑'
        };
        
        const EMOTION_COLORS = {
            [EmotionType.JOY]: '#ffd700',
            [EmotionType.SADNESS]: '#4a90e2',
            [EmotionType.ANGER]: '#e74c3c',
            [EmotionType.SURPRISE]: '#9b59b6',
            [EmotionType.FEAR]: '#2c3e50',
            [EmotionType.DISGUST]: '#27ae60',
            [EmotionType.NEUTRAL]: '#95a5a6',
            [EmotionType.LOVE]: '#ff69b4',
            [EmotionType.EXCITEMENT]: '#ff1493',
            [EmotionType.ANXIETY]: '#ff8c00'
        };
        
        const EMOTION_VALIENCE_AROUSAL = {
            [EmotionType.JOY]: [0.8, 0.6],
            [EmotionType.SADNESS]: [-0.7, -0.4],
            [EmotionType.ANGER]: [-0.6, 0.8],
            [EmotionType.SURPRISE]: [0.3, 0.9],
            [EmotionType.FEAR]: [-0.8, 0.7],
            [EmotionType.DISGUST]: [-0.9, 0.5],
            [EmotionType.NEUTRAL]: [0.0, 0.1],
            [EmotionType.LOVE]: [0.9, 0.5],
            [EmotionType.EXCITEMENT]: [0.85, 0.9],
            [EmotionType.ANXIETY]: [-0.5, 0.7]
        };
        
        class EmotionState {
            constructor(type, intensity, decayRate = 0.02) {
                this.type = type;
                this.intensity = intensity;
                this.initialIntensity = intensity;
                this.timestamp = Date.now();
                this.decayRate = decayRate;
            }
            
            getCurrentIntensity() {
                const elapsed = (Date.now() - this.timestamp) / 1000;
                return Math.max(0, this.intensity * Math.exp(-this.decayRate * elapsed));
            }
            
            isAlive() {
                return this.getCurrentIntensity() > 0.05;
            }
        }
        
        class EmotionEngine {
            constructor() {
                this.emotions = new Map();
                this.eventHistory = [];
                this.config = {
                    decayRate: 0.02,
                    activationThreshold: 0.3,
                    autoDecay: true
                };
            }
            
            triggerEvent(eventType, payload) {
                const event = {
                    id: `e${Date.now()}`,
                    type: eventType,
                    payload: payload,
                    timestamp: Date.now()
                };
                
                this.eventHistory.unshift(event);
                if (this.eventHistory.length > 50) {
                    this.eventHistory.pop();
                }
                
                const changes = this.evaluateEvent(event);
                changes.forEach(([emotionType, delta]) => {
                    this.modifyEmotion(emotionType, delta);
                });
                
                updateUI();
            }
            
            evaluateEvent(event) {
                const changes = [];
                const { type, payload } = event;
                
                if (type === 'user_message') {
                    const text = (payload.text || '').toLowerCase();
                    
                    if (text.match(/棒 | 好|开心|高兴|谢谢|great|love|amazing/)) {
                        changes.push([EmotionType.JOY, 0.4]);
                    }
                    if (text.match(/难过 | 伤心|sad|unhappy|哭/)) {
                        changes.push([EmotionType.SADNESS, 0.3]);
                    }
                    if (text.match(/生气 | 愤怒|angry|mad|恨/)) {
                        changes.push([EmotionType.ANGER, 0.5]);
                    }
                    if (text.match(/惊讶 | 哇|wow|surprise|unexpected/)) {
                        changes.push([EmotionType.SURPRISE, 0.6]);
                    }
                    if (text.match(/爱|love|喜欢|like|❤/)) {
                        changes.push([EmotionType.LOVE, 0.5]);
                    }
                    if (text.match(/害怕 | 恐惧|scared|fear|恐怖/)) {
                        changes.push([EmotionType.FEAR, 0.4]);
                    }
                } else if (type === 'environment_change' && payload.unexpected) {
                    changes.push([EmotionType.SURPRISE, 0.5]);
                } else if (type === 'memory_recall') {
                    if (payload.valence === 'positive') {
                        changes.push([EmotionType.JOY, 0.3]);
                    } else {
                        changes.push([EmotionType.SADNESS, 0.4]);
                    }
                }
                
                return changes;
            }
            
            modifyEmotion(type, delta) {
                if (this.emotions.has(type)) {
                    const existing = this.emotions.get(type);
                    existing.intensity = Math.min(1, existing.intensity + delta);
                    existing.timestamp = Date.now();
                } else {
                    this.emotions.set(type, new EmotionState(type, delta, this.config.decayRate));
                }
            }
            
            update() {
                if (!this.config.autoDecay) return;
                
                for (const [type, emotion] of this.emotions) {
                    if (!emotion.isAlive()) {
                        this.emotions.delete(type);
                    }
                }
            }
            
            getState() {
                this.update();
                
                const activeEmotions = Array.from(this.emotions.entries())
                    .filter(([_, e]) => e.isAlive());
                
                let dominant = EmotionType.NEUTRAL;
                let maxIntensity = 0;
                
                activeEmotions.forEach(([type, emotion]) => {
                    const intensity = emotion.getCurrentIntensity();
                    if (intensity > maxIntensity) {
                        maxIntensity = intensity;
                        dominant = type;
                    }
                });
                
                let totalValence = 0, totalArousal = 0, totalWeight = 0;
                activeEmotions.forEach(([type, emotion]) => {
                    const intensity = emotion.getCurrentIntensity();
                    const [valence, arousal] = EMOTION_VALIENCE_AROUSAL[type] || [0, 0.1];
                    totalValence += valence * intensity;
                    totalArousal += arousal * intensity;
                    totalWeight += intensity;
                });
                
                return {
                    dominant,
                    emotions: activeEmotions.map(([type, e]) => ({
                        type,
                        intensity: e.getCurrentIntensity()
                    })),
                    valence: totalWeight > 0 ? totalValence / totalWeight : 0,
                    arousal: totalWeight > 0 ? totalArousal / totalWeight : 0.1
                };
            }
            
            reset() {
                this.emotions.clear();
                this.eventHistory = [];
            }
        }
        
        // ═══════════════════════════════════════════════════════════
        // UI 更新
        // ═══════════════════════════════════════════════════════════
        
        const engine = new EmotionEngine();
        let animationFrame = null;
        
        function updateUI() {
            const state = engine.getState();
            
            // 更新主导情感
            document.getElementById('dominantEmoji').textContent = EMOTION_EMOJI[state.dominant];
            document.getElementById('dominantName').textContent = EMOTION_NAMES[state.dominant];
            
            // 更新情感条
            const barsContainer = document.getElementById('emotionBars');
            barsContainer.innerHTML = '';
            
            state.emotions.sort((a, b) => b.intensity - a.intensity).forEach(emotion => {
                const container = document.createElement('div');
                container.className = 'emotion-bar-container';
                
                const label = document.createElement('div');
                label.className = 'emotion-label';
                label.innerHTML = `
                    <span>${EMOTION_EMOJI[emotion.type]} ${EMOTION_NAMES[emotion.type]}</span>
                    <span>${emotion.intensity.toFixed(2)}</span>
                `;
                
                const bar = document.createElement('div');
                bar.className = 'emotion-bar';
                
                const fill = document.createElement('div');
                fill.className = 'emotion-bar-fill';
                fill.style.width = `${emotion.intensity * 100}%`;
                fill.style.backgroundColor = EMOTION_COLORS[emotion.type];
                fill.textContent = `${(emotion.intensity * 100).toFixed(0)}%`;
                
                bar.appendChild(fill);
                container.appendChild(label);
                container.appendChild(bar);
                barsContainer.appendChild(container);
            });
            
            // 更新效价和唤醒度
            const valenceIndicator = document.getElementById('valenceIndicator');
            const arousalIndicator = document.getElementById('arousalIndicator');
            
            valenceIndicator.style.left = `${((state.valence + 1) / 2) * 100}%`;
            arousalIndicator.style.left = `${state.arousal * 100}%`;
            
            document.getElementById('valenceValue').textContent = state.valence.toFixed(2);
            document.getElementById('arousalValue').textContent = state.arousal.toFixed(2);
            
            // 更新时间线
            updateTimeline();
            
            // 更新图表
            drawStateChart(state);
        }
        
        function updateTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            
            engine.eventHistory.slice(0, 10).forEach(event => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                
                const time = new Date(event.timestamp).toLocaleTimeString();
                const eventType = event.type === 'user_message' ? 
                    `消息: "${event.payload.text}"` : 
                    event.type;
                
                item.innerHTML = `
                    <span class="timeline-time">${time}</span>
                    <span class="timeline-event">${eventType}</span>
                `;
                
                timeline.appendChild(item);
            });
        }
        
        function drawStateChart(state) {
            const canvas = document.getElementById('stateCanvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布尺寸
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            // 清空
            ctx.clearRect(0, 0, rect.width, rect.height);
            
            // 绘制坐标轴
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(40, 20);
            ctx.lineTo(40, rect.height - 30);
            ctx.lineTo(rect.width - 20, rect.height - 30);
            ctx.stroke();
            
            // 绘制情感点
            const centerX = rect.width / 2;
            const centerY = (rect.height - 30) / 2;
            const radius = Math.min(centerX, centerY) - 30;
            
            state.emotions.forEach(emotion => {
                const [valence, arousal] = EMOTION_VALIENCE_AROUSAL[emotion.type];
                const x = centerX + valence * radius;
                const y = centerY - arousal * radius;
                
                // 绘制点
                ctx.fillStyle = EMOTION_COLORS[emotion.type];
                ctx.beginPath();
                ctx.arc(x, y, emotion.intensity * 20 + 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 绘制标签
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(EMOTION_EMOJI[emotion.type], x, y + 5);
            });
            
            // 绘制坐标轴标签
            ctx.fillStyle = '#888';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('负面', 20, rect.height - 30);
            ctx.fillText('正面', rect.width - 20, rect.height - 30);
            ctx.fillText('平静', centerX, rect.height - 15);
            ctx.fillText('激动', centerX, 15);
        }
        
        // ═══════════════════════════════════════════════════════════
        // 事件处理
        // ═══════════════════════════════════════════════════════════
        
        function triggerEvent(type, payload) {
            engine.triggerEvent(type, payload);
        }
        
        function showCustomInput() {
            document.getElementById('customInput').style.display = 'flex';
            document.getElementById('customMessage').focus();
        }
        
        function sendCustomMessage() {
            const input = document.getElementById('customMessage');
            const text = input.value.trim();
            if (text) {
                triggerEvent('user_message', { text });
                input.value = '';
                document.getElementById('customInput').style.display = 'none';
            }
        }
        
        function resetEmotions() {
            engine.reset();
            updateUI();
        }
        
        function updateConfig() {
            engine.config.decayRate = parseFloat(document.getElementById('decayRate').value);
            engine.config.activationThreshold = parseFloat(document.getElementById('threshold').value);
            
            document.getElementById('decayRateValue').textContent = engine.config.decayRate.toFixed(3);
            document.getElementById('thresholdValue').textContent = engine.config.activationThreshold.toFixed(2);
        }
        
        function toggleAutoDecay() {
            engine.config.autoDecay = document.getElementById('autoDecay').checked;
        }
        
        // ═══════════════════════════════════════════════════════════
        // 初始化
        // ═══════════════════════════════════════════════════════════
        
        function gameLoop() {
            updateUI();
            animationFrame = requestAnimationFrame(gameLoop);
        }
        
        // 启动
        updateUI();
        gameLoop();
        
        // 窗口大小改变时重绘图表
        window.addEventListener('resize', () => {
            const state = engine.getState();
            drawStateChart(state);
        });
    </script>
</body>
</html>
